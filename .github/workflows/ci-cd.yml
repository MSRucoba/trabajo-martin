name: CI/CD - SpaceUp + SonarQube + Docker

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  SONAR_HOST_URL: http://localhost:9000
  APP_CONTAINER_NAME: spaceup-backend

jobs:
  sonar-analysis:
    name: SonarQube Analysis
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            SpaceUpBackend/package-lock.json
            SpaceUpWeb/package-lock.json

      - name: Install backend dependencies
        working-directory: SpaceUpBackend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: SpaceUpBackend
        run: npm run test -- --coverage

      - name: Install frontend dependencies
        working-directory: SpaceUpWeb
        run: npm ci

      - name: Run frontend tests
        working-directory: SpaceUpWeb
        run: npm run test:ci

      - name: SonarQube Scan
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_PATH: ${{ vars.SONAR_SCANNER_PATH }}
        run: .\.github\scripts\run-sonar.ps1 -SonarHostUrl $env:SONAR_HOST_URL -SonarToken $env:SONAR_TOKEN -SonarScannerPath $env:SONAR_SCANNER_PATH

  build-and-deploy:
    name: Build and Start Containers
    runs-on: self-hosted
    needs: sonar-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop old containers
        run: docker compose down --remove-orphans || true

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for containers
        run: sleep 15

      - name: Show running containers
        run: docker ps

      - name: Show backend logs
        run: docker logs --tail 50 $APP_CONTAINER_NAME || true
