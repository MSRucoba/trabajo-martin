# ============================================
# SpaceUp - Frontend con Docker Compose
# ============================================
# Uso:
#   docker compose up -d        # Levantar frontend
#   docker compose logs -f frontend
#   docker compose down         # Detener
# ============================================

services:
  frontend:
    build:
      context: ./SpaceUpWeb
      dockerfile: Dockerfile
    container_name: spaceup-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - spaceup-network

networks:
  spaceup-network:
    driver: bridge
